; 【第一层：主力-俄罗斯】
; 解释：只有一个节点时，用 fallback 是最稳的。它只检查“通不通”，不关心“快不快”。
; 间隔改为 600 (10分钟)，让它变得“迟钝”一点，忽略偶尔的丢包。
custom_proxy_group=去广-主力`fallback`(俄罗斯)`http://www.gstatic.com/generate_204`600,0
; 【第二层：备选】
; 解释：阿塞拜疆/马其顿。间隔 600，容差 0 (fallback下容差无效，写0即可)。
custom_proxy_group=去广-备选`fallback`(阿塞拜疆|马其顿|阿尔巴尼亚|缅甸|摩尔多瓦|蒙古|叙利亚)`http://www.gstatic.com/generate_204`600,0
; 【第三层：总控】
; 解释：死死咬住 [主力]。除非俄罗斯彻底断连超过 10 分钟，否则绝不切换。
custom_proxy_group=去广-自动`fallback`[]去广-主力`[]去广-备选`(哈萨克|吉尔吉斯|柬埔)`http://www.gstatic.com/generate_204`600,0


